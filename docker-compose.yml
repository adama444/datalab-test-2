x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW_UID: ${AIRFLOW_UID}
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    # Pass MinIO and Postgres config to DAGs via env vars
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
    MINIO_BUCKET_CLEANED: ${MINIO_BUCKET_CLEANED}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    SILVER_SCHEMA: ${SILVER_SCHEMA}
    SILVER_TABLE: ${SILVER_TABLE}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - datalab-network-1
  restart: unless-stopped

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: datalab_postgis_1
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_1:/var/lib/postgresql/data
      # Auto-run schema init on first startup
      - ./scripts/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datalab-network-1
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: togo_datalab_minio_1
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API
      - "9003:9001"   # MinIO Console UI
    volumes:
      - minio_data_1:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datalab-network-1
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: togo_datalab_minio_init_1
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET_RAW};
        mc mb --ignore-existing local/${MINIO_BUCKET_CLEANED};
        echo 'Buckets created successfully.';
      "
    networks:
      - datalab-network-1

  airflow-init:
    <<: *airflow-common
    container_name: togo_airflow_init_1
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/airflow/scripts/airflow_init.sh"]
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: togo_airflow_webserver_1
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: togo_airflow_scheduler_1
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: datalab-superset
    env_file:
    - .env
    environment:
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    ports:
      - "8088:8088"
    depends_on:
      - postgres
    volumes:
      - superset_home:/app/superset_home
    restart: always
    networks:
      - datalab-network-1

  # --- PROCESSING (Apache Spark) ---
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: togo_spark_master_1
    ports:
      - "8083:8080" # Spark Master UI
      - "7077:7077" # Spark Master Port
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_LOCAL_IP=spark-master
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - datalab-network-1
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./src:/opt/spark/src

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: togo_spark_worker_1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
    networks:
      - datalab-network-1
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./src:/opt/spark/src

volumes:
  postgres_data_1:
  minio_data_1:
  superset_home:

networks:
  datalab-network-1:
    driver: bridge